services:

  postgres:
    image: postgres:18

    environment:
      POSTGRES_DB: SNUS
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gorki123

    ports:
      - "5433:5432"

    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d SNUS"]
        interval: 5s
        timeout: 5s
        retries: 10

  ingestion:
    build:
      context: .
      dockerfile: IngestionService/Dockerfile

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "5141:8080"

  consensus:
    build:
      context: .
      dockerfile: ConsensusService/Dockerfile

    depends_on:
      postgres:
        condition: service_healthy

  notification:
    build:
      context: .
      dockerfile: NotificationService/Dockerfile

    depends_on:
      postgres:
        condition: service_healthy

  monitor:
    build:
      context: .
      dockerfile: MonitorClient/Dockerfile

    depends_on:
      - notification

  ingress:
    build:
      context: .
      dockerfile: Ingress/Dockerfile

    ports:
      - "8080:8080"

    depends_on:
      - ingestion

  simulator:
    build:
      context: .
      dockerfile: SensorSimulator/Dockerfile

    depends_on:
      - ingestion